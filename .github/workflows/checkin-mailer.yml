name: Kanlaya Check-in Mailer

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-Run (kein Versand, kein Notion-Update)"
        required: false
        default: "false"
      test_recipient:
        description: "Test-Empfänger (überschreibt alle Empfänger)"
        required: false
        default: ""
      delay_minutes:
        description: "Min. Alter eines Check-ins, bevor Mail rausgeht (Default 90)"
        required: false
        default: "90"
      test_send:
        description: "Test-Send: Beispiel-Treuemails (Besuch 1/7/10) NUR an diese Adresse, kein Notion"
        required: false
        default: ""

concurrency:
  group: checkin-mailer
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - run: pip install -r requirements.txt

      - name: Run mailer
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          TEST_RECIPIENT: ${{ github.event.inputs.test_recipient }}
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          FOLLOWUP_DELAY_MIN: ${{ github.event.inputs.delay_minutes || '90' }}
          EARLIEST_CHECKIN_ISO: ${{ secrets.EARLIEST_CHECKIN_ISO }}
        run: |
          if [ -n "${{ github.event.inputs.test_send }}" ]; then
            python mailer.py --test-send "${{ github.event.inputs.test_send }}"
          else
            python mailer.py
          fi
